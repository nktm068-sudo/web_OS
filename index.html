<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ST-OS | SpeedTehnology</title>
    <link rel="icon" type="image/png" href="icom.png">
    
    <style>
        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; height: 100vh; color: white; }
        
        /* РАБОЧИЙ СТОЛ С ТВОИМИ ОБОЯМИ */
        #desktop { 
            width: 100%; 
            height: 100%; 
            background: url('Wallaper.jpg') center/cover no-repeat; 
            display: flex; 
            position: relative; 
        }

        /* ОБЩИЙ СТИЛЬ ДЛЯ ИКОНОК */
        .icon-app {
            width: 90px;
            height: 110px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: absolute;
            transition: 0.2s;
            user-select: none;
            border: 1px solid transparent;
        }
        .icon-app:hover { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 8px; }
        .icon-app img { width: 55px; filter: drop-shadow(0 0 10px rgba(82, 136, 193, 0.8)); }
        .icon-app span { font-size: 11px; margin-top: 8px; text-shadow: 2px 2px 4px black; text-align: center; font-weight: bold; }

        /* ОКНА (ОБЩИЙ СТИЛЬ) */
        .window {
            position: absolute;
            background: #0e1621;
            border: 1px solid #17212b;
            border-radius: 12px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.9);
            display: none;
            flex-direction: column;
            z-index: 1000;
            overflow: hidden;
            transition: width 0.3s, height 0.3s, top 0.3s, left 0.3s;
        }

        .win-header {
            background: #17212b;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .win-controls { display: flex; gap: 8px; }
        .win-btn { width: 14px; height: 14px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: bold; color: white; }
        .btn-close { background: #ff4d4d; }
        .btn-max { background: #febc2e; }

        .app-content { flex: 1; width: 100%; border: none; background: #0e1621; }

        /* ПАНЕЛЬ ЗАДАЧ */
        #taskbar {
            position: absolute; bottom: 0; width: 100%; height: 45px;
            background: rgba(23, 33, 43, 0.8);
            backdrop-filter: blur(12px);
            display: flex; align-items: center; padding: 0 15px;
            z-index: 2000;
            box-sizing: border-box;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .start-icon { width: 32px; height: 32px; cursor: pointer; transition: 0.3s; }
        .clock { margin-left: auto; font-size: 13px; font-weight: bold; letter-spacing: 1px; }
    </style>
</head>
<body>

<div id="desktop">
    <!-- ИКОНКА SpeedChat -->
    <div class="icon-app" style="top: 20px; left: 20px;" ondblclick="openApp('window-chat')">
        <img src="icom.png">
        <span>SpeedChat<br>Messenger</span>
    </div>

    <!-- ИКОНКА Google (НОВАЯ!) -->
    <div class="icon-app" style="top: 20px; left: 130px;" ondblclick="openApp('window-google')">
        <img src="Google.png">
        <span>Google<br>Search</span>
    </div>

    <!-- ОКНО SPEEDCHAT -->
    <div id="window-chat" class="window" style="top: 10%; left: 5%; width: 85%; height: 75%;">
        <div class="win-header">
            <div style="display:flex; align-items:center; gap:8px;">
                <img src="icom.png" width="18">
                <span style="font-size:12px; font-weight:bold;">ST-OS: SpeedChat</span>
            </div>
            <div class="win-controls">
                <button class="win-btn btn-max" onclick="toggleFull('window-chat')">□</button>
                <button class="win-btn btn-close" onclick="closeApp('window-chat')">×</button>
            </div>
        </div>
        <iframe id="chat-frame" class="app-content" src="https://nktm068-sudo.github.io/SpeedChat/?"></iframe>
    </div>

    <!-- ОКНО GOOGLE (ДРУГОЕ ОКНО!) -->
    <div id="window-google" class="window" style="top: 15%; left: 10%; width: 80%; height: 70%; background: white;">
        <div class="win-header">
            <div style="display:flex; align-items:center; gap:8px;">
                <img src="Google.png" width="18">
                <span style="font-size:12px; font-weight:bold; color: white;">ST-OS: Google Search</span>
            </div>
            <div class="win-controls">
                <button class="win-btn btn-max" onclick="toggleFull('window-google')">□</button>
                <button class="win-btn btn-close" onclick="closeApp('window-google')">×</button>
            </div>
        </div>
        <iframe class="app-content" src="https://google.com"></iframe>
    </div>

    <!-- ПАНЕЛЬ ЗАДАЧ -->
    <div id="taskbar">
        <img src="icom.png" class="start-icon" title="Пуск ST-OS">
        <div style="margin-left: 20px; font-size: 10px; color: #5288c1; opacity: 0.8;">Powered by SpeedTehnology (ST)</div>
        <div class="clock" id="clock">00:00</div>
    </div>
</div>

<script>
    function openApp(id) {
        document.getElementById(id).style.display = 'flex';
        // Если открываем чат, обновим фрейм
        if(id === 'window-chat') {
            const frame = document.getElementById('chat-frame');
            frame.src = frame.src;
        }
    }

    function closeApp(id) {
        document.getElementById(id).style.display = 'none';
    }

    function toggleFull(id) {
        let win = document.getElementById(id);
        if(win.style.width === "100%") {
            win.style.width = id === 'window-chat' ? "85%" : "80%";
            win.style.height = id === 'window-chat' ? "75%" : "70%";
            win.style.top = id === 'window-chat' ? "10%" : "15%";
            win.style.left = id === 'window-chat' ? "5%" : "10%";
        } else {
            win.style.width = "100%"; win.style.height = "100%"; win.style.top = "0"; win.style.left = "0";
        }
    }

    function updateClock() {
        let now = new Date();
        let h = now.getHours();
        let m = now.getMinutes();
        if(m < 10) m = '0' + m;
        document.getElementById('clock').innerText = h + ":" + m;
    }
    setInterval(updateClock, 1000);
    updateClock();
</script>
</body>
</html>
